<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./public/css/style.css" />

    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main class="main">
      <div class="card">
        <div class="card-logo">
          <img
            src="./public/images/illustration-hero.svg"
            alt="Order Summary Logo"
          />
        </div>
        <div class="card-wrapper">
          <div class="card-text">
            <h1>Order Summary</h1>
            <p>
              You can now listen to millions of songs, audiobooks, and podcasts
              on any device anywhere you like!
            </p>
          </div>

          <div class="card-price">
            <div class="card-price__icon">
              <img src="./public/images/icon-music.svg" alt="Music Icon" />
              <h2>Annual Plan <span>$59.99/year</span></h2>
            </div>

            <a class="btn-change" href="#">Change</a>
          </div>

          <a href="#" class="btn-proceed">Proceed to Payment</a>

          <a href="#" class="btn-cancel">Cancel Order</a>
        </div>
      </div>
    </main>
  </body>
</html>
